<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대항해시대2 - TV 뷰어</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
      color: #fff;
    }

    #game-canvas {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain; /* 비율 유지하며 최대 크기 */
      width: 100vw;
      height: 100vh;
      image-rendering: pixelated;
    }

    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      z-index: 100;
    }

    #overlay h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #f4c55b;
    }

    #status {
      font-size: 1.1rem;
      color: #aaa;
      margin-bottom: 2rem;
    }

    .spinner {
      width: 50px; height: 50px;
      border: 4px solid #333;
      border-top-color: #f4c55b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #fps-counter {
      position: fixed;
      top: 10px; right: 14px;
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      font-weight: bold;
      pointer-events: none;
      z-index: 200;
      text-shadow: 1px 1px 2px #000;
    }
  </style>
</head>
<body>

  <canvas id="game-canvas"></canvas>

  <div id="overlay">
    <h1>&#x1F30A; 대항해시대2</h1>
    <p id="status">서버에 연결 중...</p>
    <div class="spinner" id="spinner"></div>
  </div>

  <div id="fps-counter">-- fps</div>

  <script>
    const canvas   = document.getElementById('game-canvas');
    const ctx      = canvas.getContext('2d');
    const overlay  = document.getElementById('overlay');
    const statusEl = document.getElementById('status');
    const fpsEl    = document.getElementById('fps-counter');

    const wsHost = window.location.hostname;
    const WS_URL = 'ws://' + wsHost + ':5174';

    let ws = null;
    let frameCount = 0;
    let lastFpsTime = performance.now();

    // 오디오 관련 변수
    let audioCtx = null;
    let nextAudioTime = 0;

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
      nextAudioTime = audioCtx.currentTime;
      console.log('[Viewer] AudioContext initialized');
    }

    function connect() {
      statusEl.textContent = '연결 중... (' + WS_URL + ')';
      ws = new WebSocket(WS_URL);
      ws.binaryType = 'arraybuffer';

      ws.onopen = function() {
        console.log('[Viewer] 연결 성공');
        statusEl.textContent = '게임 로딩 중...';
      };

      ws.onmessage = function(e) {
        if (overlay.style.display !== 'none') {
          overlay.style.display = 'none';
        }

        const data = new Uint8Array(e.data);
        const type = data[0]; // 첫 바이트: 0x00(영상), 0x01(음성)
        const payload = e.data.slice(1);

        if (type === 0x00) {
          // 비디오 프레임 처리
          var blob = new Blob([payload], { type: 'image/jpeg' });
          createImageBitmap(blob).then(function(bitmap) {
            if (canvas.width !== bitmap.width) {
              canvas.width  = bitmap.width;
              canvas.height = bitmap.height;
            }
            ctx.drawImage(bitmap, 0, 0);
            bitmap.close();

            frameCount++;
            var now = performance.now();
            if (now - lastFpsTime >= 1000) {
              fpsEl.textContent = frameCount + ' fps';
              frameCount = 0;
              lastFpsTime = now;
            }
          });
        } else if (type === 0x01 && audioCtx) {
          // 오디오 프레임 처리 (Int16 PCM)
          const int16 = new Int16Array(payload);
          const buffer = audioCtx.createBuffer(2, int16.length / 2, audioCtx.sampleRate);
          const left = buffer.getChannelData(0);
          const right = buffer.getChannelData(1);

          for (let i = 0; i < int16.length / 2; i++) {
            left[i] = int16[i * 2] / 0x7FFF;
            right[i] = int16[i * 2 + 1] / 0x7FFF;
          }

          const source = audioCtx.createBufferSource();
          source.buffer = buffer;
          source.connect(audioCtx.destination);
          
          // 오디오 노드 스케줄링 (끊김 방지)
          const startTime = Math.max(nextAudioTime, audioCtx.currentTime);
          source.start(startTime);
          nextAudioTime = startTime + buffer.duration;
        }
      };

      ws.onclose = function() {
        console.log('[Viewer] 연결 끊김. 3초 후 재연결...');
        overlay.style.display = 'flex';
        statusEl.textContent = '연결이 끊겼습니다. 재연결 중...';
        setTimeout(connect, 3000);
      };

      ws.onerror = function() {
        statusEl.textContent = '연결 오류. 서버가 실행 중인지 확인하세요.';
      };
    }

    // 브라우저 보안 정책상 첫 클릭이 있어야 소리가 재생됨
    document.addEventListener('click', function() {
      initAudio();
    }, { once: true });

    var ALLOWED_KEYS = {
      'ArrowUp':1,'ArrowDown':1,'ArrowLeft':1,'ArrowRight':1,
      'Enter':1,'Escape':1,'Space':1,
      'F1':1,'F2':1,'F3':1,'F4':1,'F5':1,'F6':1,'F7':1,'F8':1,'F9':1,'F10':1,
      'Backspace':1,'Tab':1,'Home':1,'End':1,'PageUp':1,'PageDown':1,
    };
    'abcdefghijklmnopqrstuvwxyz0123456789'.split('').forEach(function(k) {
      ALLOWED_KEYS[k] = 1;
      ALLOWED_KEYS[k.toUpperCase()] = 1;
    });

    function sendKey(type, e) {
      if (!ws || ws.readyState !== 1) return;
      var key = e.key === ' ' ? 'Space' : e.key;
      if (!ALLOWED_KEYS[key]) return;
      e.preventDefault();
      ws.send(JSON.stringify({ type: type, key: key }));
    }

    document.addEventListener('keydown', function(e) { sendKey('keydown', e); });
    document.addEventListener('keyup',   function(e) { sendKey('keyup', e); });

    canvas.addEventListener('click', function(e) {
      if (!ws || ws.readyState !== 1) return;
      var rect = canvas.getBoundingClientRect();
      
      // 실제 이미지 비율과 엘리먼트 비율 비교 (여백 계산용)
      var imgRatio = canvas.width / canvas.height;
      var elRatio  = rect.width / rect.height;
      
      var actualWidth, actualHeight, offsetX, offsetY;
      
      if (elRatio > imgRatio) {
        // 좌우 여백 발생
        actualWidth  = rect.height * imgRatio;
        actualHeight = rect.height;
        offsetX      = (rect.width - actualWidth) / 2;
        offsetY      = 0;
      } else {
        // 상하 여백 발생
        actualWidth  = rect.width;
        actualHeight = rect.width / imgRatio;
        offsetX      = 0;
        offsetY      = (rect.height - actualHeight) / 2;
      }
      
      // 여백을 제외한 실제 이미지 기준 좌표 계산
      var x = (e.clientX - rect.left - offsetX) * (canvas.width / actualWidth);
      var y = (e.clientY - rect.top - offsetY) * (canvas.height / actualHeight);
      
      // 이미지 영역 안쪽 클릭만 전송
      if (x >= 0 && x <= canvas.width && y >= 0 && y <= canvas.height) {
        ws.send(JSON.stringify({ type: 'click', x: Math.round(x), y: Math.round(y) }));
      }
    });

    connect();
  </script>
</body>
</html>
