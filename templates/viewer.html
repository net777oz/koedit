<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대항해시대2 - TV 뷰어</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
      color: #fff;
    }

    #game-canvas {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain; /* 비율 유지하며 최대 크기 */
      width: 100vw;
      height: 100vh;
      image-rendering: pixelated;
    }

    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      z-index: 100;
    }

    #overlay h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #f4c55b;
    }

    #status {
      font-size: 1.1rem;
      color: #aaa;
      margin-bottom: 2rem;
    }

    .spinner {
      width: 50px; height: 50px;
      border: 4px solid #333;
      border-top-color: #f4c55b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #fps-counter {
      position: fixed;
      top: 10px; right: 14px;
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      font-weight: bold;
      pointer-events: none;
      z-index: 200;
      text-shadow: 1px 1px 2px #000;
    }
  </style>
</head>
<body>

  <canvas id="game-canvas"></canvas>

  <div id="overlay">
    <h1>&#x1F30A; 대항해시대2</h1>
    <p id="status">서버에 연결 중...</p>
    <div class="spinner" id="spinner"></div>
  </div>

  <div id="fps-counter">-- fps</div>

  <script>
    const canvas   = document.getElementById('game-canvas');
    const ctx      = canvas.getContext('2d');
    const overlay  = document.getElementById('overlay');
    const statusEl = document.getElementById('status');
    const fpsEl    = document.getElementById('fps-counter');

    const wsHost = window.location.hostname;
    const WS_URL = 'ws://' + wsHost + ':5174';

    let ws = null;
    let frameCount = 0;
    let lastFpsTime = performance.now();

    // 오디오 관련 변수
    let audioCtx = null;
    let nextAudioTime = 0;

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
      nextAudioTime = audioCtx.currentTime;
      console.log('[Viewer] AudioContext initialized');
    }

    function connect() {
      statusEl.textContent = '연결 중... (' + WS_URL + ')';
      ws = new WebSocket(WS_URL);
      ws.binaryType = 'arraybuffer';

      ws.onopen = function() {
        console.log('[Viewer] 연결 성공');
        statusEl.textContent = '게임 로딩 중...';
      };

      ws.onmessage = function(e) {
        if (overlay.style.display !== 'none') {
          overlay.style.display = 'none';
        }

        const data = new Uint8Array(e.data);
        const type = data[0]; // 첫 바이트: 0x00(영상), 0x01(음성)
        const payload = e.data.slice(1);

        if (type === 0x00) {
          // 비디오 프레임 처리
          var blob = new Blob([payload], { type: 'image/jpeg' });
          createImageBitmap(blob).then(function(bitmap) {
            if (canvas.width !== bitmap.width) {
              canvas.width  = bitmap.width;
              canvas.height = bitmap.height;
            }
            ctx.drawImage(bitmap, 0, 0);
            bitmap.close();

            frameCount++;
            var now = performance.now();
            if (now - lastFpsTime >= 1000) {
              fpsEl.textContent = frameCount + ' fps';
              frameCount = 0;
              lastFpsTime = now;
            }
          });
        } else if (type === 0x01 && audioCtx) {
          // 오디오 프레임 처리 (Int16 PCM)
          const int16 = new Int16Array(payload);
          const buffer = audioCtx.createBuffer(2, int16.length / 2, audioCtx.sampleRate);
          const left = buffer.getChannelData(0);
          const right = buffer.getChannelData(1);

          for (let i = 0; i < int16.length / 2; i++) {
            left[i] = int16[i * 2] / 0x7FFF;
            right[i] = int16[i * 2 + 1] / 0x7FFF;
          }

          const source = audioCtx.createBufferSource();
          source.buffer = buffer;
          source.connect(audioCtx.destination);
          
          // 오디오 노드 스케줄링 (끊김 방지)
          const startTime = Math.max(nextAudioTime, audioCtx.currentTime);
          source.start(startTime);
          nextAudioTime = startTime + buffer.duration;
        }
      };

      ws.onclose = function() {
        console.log('[Viewer] 연결 끊김. 3초 후 재연결...');
        overlay.style.display = 'flex';
        statusEl.textContent = '연결이 끊겼습니다. 재연결 중...';
        setTimeout(connect, 3000);
      };

      ws.onerror = function() {
        statusEl.textContent = '연결 오류. 서버가 실행 중인지 확인하세요.';
      };
    }

    // 브라우저 보안 정책상 첫 클릭이 있어야 소리가 재생됨
    document.addEventListener('click', function() {
      initAudio();
    }, { once: true });

    var ALLOWED_KEYS = {
      'ArrowUp':1,'ArrowDown':1,'ArrowLeft':1,'ArrowRight':1,
      'Enter':1,'Escape':1,'Space':1,
      'F1':1,'F2':1,'F3':1,'F4':1,'F5':1,'F6':1,'F7':1,'F8':1,'F9':1,'F10':1,
      'Backspace':1,'Tab':1,'Home':1,'End':1,'PageUp':1,'PageDown':1,
    };
    'abcdefghijklmnopqrstuvwxyz0123456789'.split('').forEach(function(k) {
      ALLOWED_KEYS[k] = 1;
      ALLOWED_KEYS[k.toUpperCase()] = 1;
    });

    function sendKey(type, e) {
      if (!ws || ws.readyState !== 1) return;
      var key = e.key === ' ' ? 'Space' : e.key;
      if (!ALLOWED_KEYS[key]) return;
      e.preventDefault();
      ws.send(JSON.stringify({ type: type, key: key }));
    }

    document.addEventListener('keydown', function(e) { sendKey('keydown', e); });
    document.addEventListener('keyup',   function(e) { sendKey('keyup', e); });

    // ── 게임패드 지원 (Web Gamepad API) ──────────────────────────────────
    var BUTTON_MAP = {
      0:  'Enter',     // A / Cross
      1:  'Escape',    // B / Circle
      2:  'Space',     // X / Square
      3:  'Tab',       // Y / Triangle
      4:  'PageUp',    // L1
      5:  'PageDown',  // R1
      6:  'F9',        // L2 → 매크로 녹화
      7:  'F10',       // R2 → 매크로 재생
      // 8: Select → Escape (별도 처리)
      9:  'Enter',     // Start
      12: 'Numpad8',   // D-pad ↑
      13: 'Numpad2',   // D-pad ↓
      14: 'Numpad4',   // D-pad ←
      15: 'Numpad6',   // D-pad →
    };
    var AXIS_DEADZONE   = 0.4;
    var CURSOR_DEADZONE = 0.15;
    var CURSOR_SPEED    = 5;   // 게임 픽셀 per frame (full deflection 기준)
    var CURSOR_INTERVAL = 33;  // mousemove 전송 최소 간격 ms (~30fps)

    // 8방향 넘패드 dirs (atan2 기반)
    var EIGHT_DIRS = ['Numpad6','Numpad3','Numpad2','Numpad1',
                      'Numpad4','Numpad7','Numpad8','Numpad9'];
    function get8Dir(x, y, dz) {
      if (Math.sqrt(x*x + y*y) < dz) return null;
      var deg = ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
      return EIGHT_DIRS[Math.round(deg / 45) % 8];
    }

    var prevButtons = {};
    var prevDir     = null;  // 왼쪽 스틱 8방향
    var padRaf      = null;

    // 게임패드 가상 커서 (게임 픽셀 좌표)
    var cursorGameX = 0;
    var cursorGameY = 0;
    var lastMoveSent = 0;

    // 커서 div
    var padCursor = document.createElement('div');
    padCursor.style.cssText = 'position:fixed;display:none;pointer-events:none;z-index:600;' +
      'width:20px;height:20px;line-height:20px;text-align:center;font-size:18px;color:#fff;' +
      'transform:translate(-10px,-10px);filter:drop-shadow(0 0 2px #000);user-select:none;';
    padCursor.textContent = '✛';
    document.body.appendChild(padCursor);

    // 게임 픽셀 → 화면 CSS 좌표 변환 (letterbox 고려)
    function gamePxToClient(gx, gy) {
      var rect = canvas.getBoundingClientRect();
      var imgRatio = canvas.width / canvas.height;
      var elRatio  = rect.width / rect.height;
      var actualWidth, actualHeight, offsetX, offsetY;
      if (elRatio > imgRatio) {
        actualWidth  = rect.height * imgRatio; actualHeight = rect.height;
        offsetX = (rect.width - actualWidth) / 2; offsetY = 0;
      } else {
        actualWidth  = rect.width; actualHeight = rect.width / imgRatio;
        offsetX = 0; offsetY = (rect.height - actualHeight) / 2;
      }
      return {
        x: rect.left + offsetX + gx * (actualWidth / canvas.width),
        y: rect.top  + offsetY + gy * (actualHeight / canvas.height),
      };
    }

    function updateCursorDiv(gx, gy) {
      var p = gamePxToClient(gx, gy);
      padCursor.style.left = p.x + 'px';
      padCursor.style.top  = p.y + 'px';
      padCursor.style.display = 'block';
    }

    var padIndicator = document.createElement('div');
    padIndicator.style.cssText = 'position:fixed;top:10px;left:14px;font-size:13px;' +
      'color:#fff;background:rgba(0,80,200,0.85);padding:3px 10px;border-radius:4px;' +
      'pointer-events:none;z-index:200;display:none;text-shadow:1px 1px 2px #000';
    document.body.appendChild(padIndicator);

    function sendGamepadKey(type, key) {
      if (!ws || ws.readyState !== 1) return;
      ws.send(JSON.stringify({ type: type, key: key }));
    }

    function pollGamepad() {
      if (!navigator.getGamepads) return;
      var pads = navigator.getGamepads();
      var pad = null;
      for (var i = 0; i < pads.length; i++) { if (pads[i]) { pad = pads[i]; break; } }
      if (pad) {
        // ── 버튼 ─────────────────────────────────────────────────────
        pad.buttons.forEach(function(btn, idx) {
          var pressed = btn.pressed;
          var was = prevButtons[idx] || false;
          if (idx === 8) {
            // Select → Escape
            if (pressed && !was) sendGamepadKey('keydown', 'Escape');
            if (!pressed && was) sendGamepadKey('keyup',   'Escape');
          } else if (idx === 11) {
            // R3 → 커서 위치 클릭
            if (pressed && !was) {
              if (ws && ws.readyState === 1) {
                ws.send(JSON.stringify({ type: 'click',
                  x: Math.round(cursorGameX), y: Math.round(cursorGameY) }));
              }
            }
          } else if (BUTTON_MAP[idx] !== undefined) {
            if (pressed && !was) sendGamepadKey('keydown', BUTTON_MAP[idx]);
            if (!pressed && was) sendGamepadKey('keyup',   BUTTON_MAP[idx]);
          }
          prevButtons[idx] = pressed;
        });

        // ── 왼쪽 스틱 → 8방향 넘패드 ────────────────────────────────
        var newDir = get8Dir(pad.axes[0] || 0, pad.axes[1] || 0, AXIS_DEADZONE);
        if (newDir !== prevDir) {
          if (prevDir) sendGamepadKey('keyup',   prevDir);
          if (newDir)  sendGamepadKey('keydown', newDir);
          prevDir = newDir;
        }

        // ── 오른쪽 스틱 → 커서 ───────────────────────────────────────
        var rx = pad.axes[2] || 0;
        var ry = pad.axes[3] || 0;
        var dx = Math.abs(rx) > CURSOR_DEADZONE ? rx * CURSOR_SPEED : 0;
        var dy = Math.abs(ry) > CURSOR_DEADZONE ? ry * CURSOR_SPEED : 0;
        if (dx !== 0 || dy !== 0) {
          cursorGameX = Math.max(0, Math.min(canvas.width,  cursorGameX + dx));
          cursorGameY = Math.max(0, Math.min(canvas.height, cursorGameY + dy));
          updateCursorDiv(cursorGameX, cursorGameY);
          var now = Date.now();
          if (now - lastMoveSent >= CURSOR_INTERVAL && ws && ws.readyState === 1) {
            var gp = gamePxToClient(cursorGameX, cursorGameY);
            ws.send(JSON.stringify({ type: 'mousemove', x: Math.round(gp.x), y: Math.round(gp.y) }));
            lastMoveSent = now;
          }
        }
      }
      padRaf = requestAnimationFrame(pollGamepad);
    }

    function startPadPolling() {
      if (padRaf) cancelAnimationFrame(padRaf);
      prevButtons = {}; prevDir = null;
      padRaf = requestAnimationFrame(pollGamepad);
    }

    if (typeof navigator.getGamepads === 'function') {
      window.addEventListener('gamepadconnected', function(e) {
        padIndicator.textContent = '🎮 ' + (e.gamepad.id.split('(')[0].trim() || '게임패드 연결됨');
        padIndicator.style.display = 'block';
        startPadPolling();
      });
      window.addEventListener('gamepaddisconnected', function() {
        var pads = navigator.getGamepads();
        var remaining = null;
        for (var i = 0; i < pads.length; i++) { if (pads[i]) { remaining = pads[i]; break; } }
        if (!remaining) { padIndicator.style.display = 'none'; padCursor.style.display = 'none'; }
      });
      var existing = null;
      var gps = navigator.getGamepads();
      for (var gi = 0; gi < gps.length; gi++) { if (gps[gi]) { existing = gps[gi]; break; } }
      if (existing) {
        padIndicator.textContent = '🎮 ' + (existing.id.split('(')[0].trim() || '게임패드');
        padIndicator.style.display = 'block';
        startPadPolling();
      }
    }
    // ─────────────────────────────────────────────────────────────────────

    canvas.addEventListener('click', function(e) {
      if (!ws || ws.readyState !== 1) return;
      var rect = canvas.getBoundingClientRect();
      
      // 실제 이미지 비율과 엘리먼트 비율 비교 (여백 계산용)
      var imgRatio = canvas.width / canvas.height;
      var elRatio  = rect.width / rect.height;
      
      var actualWidth, actualHeight, offsetX, offsetY;
      
      if (elRatio > imgRatio) {
        // 좌우 여백 발생
        actualWidth  = rect.height * imgRatio;
        actualHeight = rect.height;
        offsetX      = (rect.width - actualWidth) / 2;
        offsetY      = 0;
      } else {
        // 상하 여백 발생
        actualWidth  = rect.width;
        actualHeight = rect.width / imgRatio;
        offsetX      = 0;
        offsetY      = (rect.height - actualHeight) / 2;
      }
      
      // 여백을 제외한 실제 이미지 기준 좌표 계산
      var x = (e.clientX - rect.left - offsetX) * (canvas.width / actualWidth);
      var y = (e.clientY - rect.top - offsetY) * (canvas.height / actualHeight);
      
      // 이미지 영역 안쪽 클릭만 전송
      if (x >= 0 && x <= canvas.width && y >= 0 && y <= canvas.height) {
        ws.send(JSON.stringify({ type: 'click', x: Math.round(x), y: Math.round(y) }));
      }
    });

    connect();
  </script>
</body>
</html>
